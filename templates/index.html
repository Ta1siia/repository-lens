<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
    <title>Repository Lens</title>
  </head>
  <body>
    <form id="repo-form">
      <input
        type="text"
        id="repo-url"
        placeholder="https://github.com/owner/repo"
        required
      />
      <button type="submit" id="submit-btn">Visualize</button>
    </form>
    <div id="examples">
      <span>Try:</span>
      <button
        type="button"
        class="example-btn"
        data-repo="Ta1siia/repository-lens"
      >
        repository-lens
      </button>
      <button type="button" class="example-btn" data-repo="Ta1siia/pet-haven">
        pet-haven
      </button>
      <button type="button" class="example-btn" data-repo="pallets/flask">
        flask
      </button>
    </div>
    <div id="main">
      <div id="graph"></div>
      <div id="panel"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="{{ url_for('static', filename='js/graph.js') }}"></script>
  </body>
</html>
